<!DOCTYPE html>
<html>
<head>
    <title>Register Company – DMS</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f4f6f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .form-container {
            background-color: #fff;
            padding: 30px 40px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            width: 400px;
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #333;
        }

        label {
            display: block;
            margin-top: 15px;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 6px;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 25px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }

        .flash-messages {
            margin-top: 20px;
            text-align: center;
            color: green;
        }
    </style>
</head>
<body>

    <div class="form-container">
        <h2>Register New Company</h2>
        <form method="POST">
            <label>Company Name:</label>
            <input type="text" name="company_name" required>

            <label>Admin Name:</label>
            <input type="text" name="admin_name" required>

            <label>Email:</label>
            <input type="email" name="email" required>

            <label>Password:</label>
            <input type="password" name="password" required>

            <button type="submit">Register</button>
        </form>

        <div class="flash-messages">
            {% with messages = get_flashed_messages() %}
              {% if messages %}
                {% for msg in messages %}
                  <p>{{ msg }}</p>
                {% endfor %}
              {% endif %}
            {% endwith %}
        </div>
    </div>

</body>
</html>
