<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Forgot Password – BhavDoc</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body{background:linear-gradient(135deg,#E3F2FD,#FFF3E0);min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:Inter,system-ui,Segoe UI,Arial;}
    .card{border:0;border-radius:16px;box-shadow:0 14px 40px rgba(0,0,0,.08);}
    .brand{font-weight:800;letter-spacing:.2px}
    .accent{color:#7C4DFF}
  </style>
</head>
<body>
  <div class="card p-4" style="width: 420px;">
    <h3 class="brand mb-1">✨ Welcome to <span class="accent">BhavDoc</span></h3>
    <div class="text-muted mb-3" style="margin-top:-2px;">Designed & Developed by <b>Bhavesh Jha</b></div>
    <h5 class="mb-3">Reset your password</h5>
    <form method="POST">
      <div class="mb-3">
        <label class="form-label">Email address</label>
        <input type="email" name="email" class="form-control" placeholder="you@example.com" required>
      </div>
      <button class="btn btn-primary w-100">Send reset link</button>
    </form>
    <div class="text-center mt-3">
      <a href="{{ url_for('main.login') }}" class="text-decoration-none">Back to login</a>
    </div>
  </div>
</body>
</html>
