<!DOCTYPE html>
<html>
<head>
    <title>Add New File</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            padding: 50px;
            text-align: center;
        }

        h2 {
            color: #333;
        }

        form {
            margin-top: 30px;
        }

        input[type="text"] {
            padding: 10px;
            width: 300px;
            font-size: 16px;
        }

        button {
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background-color: #218838;
        }

        .back-link {
            display: block;
            margin-top: 30px;
            text-decoration: none;
            color: #007bff;
        }

        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <h2>Add New File to Dashboard</h2>

    <form method="POST">
        <label>Enter Filename (e.g. 1.pdf):</label><br><br>
        <input type="text" name="filename" required><br><br>
        <button type="submit">Add File</button>
    </form>

    <a href="{{ url_for('main.admin_dashboard') }}" class="back-link">← Back to Dashboard</a>

</body>
</html>
