<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Create New Password – BhavDoc</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body{background:linear-gradient(135deg,#EDE7F6,#E3F2FD);min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:Inter,system-ui,Segoe UI,Arial;}
    .card{border:0;border-radius:16px;box-shadow:0 14px 40px rgba(0,0,0,.08);}
    .brand{font-weight:800;letter-spacing:.2px}
    .accent{color:#7C4DFF}
  </style>
</head>
<body>
  <div class="card p-4" style="width: 420px;">
    <h3 class="brand mb-1">🔐 Reset Password – <span class="accent">BhavDoc</span></h3>
    <div class="text-muted mb-3" style="margin-top:-2px;">Designed & Developed by <b>Bhavesh Jha</b></div>
    <form method="POST">
      <div class="mb-3">
        <label class="form-label">New Password</label>
        <input type="password" name="password" class="form-control" minlength="6" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Confirm Password</label>
        <input type="password" name="confirm_password" class="form-control" minlength="6" required>
      </div>
      <button class="btn btn-success w-100">Update Password</button>
    </form>
  </div>
</body>
</html>
